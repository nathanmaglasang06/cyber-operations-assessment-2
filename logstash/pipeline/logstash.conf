# =============================================================================
# Logstash Pipeline - CarePlus Security Logs Ingestion
# =============================================================================
# Input:  Reads careplus_elk_security_logs.jsonl from mounted volume
# Filter: Parses JSON, handles timestamps, enriches fields
# Output: Sends to Elasticsearch index 'careplus-security-logs'
# =============================================================================

input {
  # Read the JSONL file from mounted logs directory
  file {
    path => "/usr/share/logstash/logs/careplus_elk_security_logs.jsonl"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
    type => "careplus-security"
  }

  # Optional: TCP input for real-time log streaming
  tcp {
    port => 5000
    codec => json_lines
    type => "tcp-input"
  }

  # Optional: Beats input for Elastic Agent/Filebeat
  beats {
    port => 5044
    type => "beats"
  }
}

filter {
  # Ensure @timestamp is properly parsed
  if [@timestamp] {
    date {
      match => ["@timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # Parse source_type for index routing
  if [source_type] {
    mutate {
      add_field => { "[log][source_type]" => "%{source_type}" }
    }
  }

  # Categorize by severity for dashboard filtering
  if [severity] {
    mutate {
      add_field => { "[event][severity_label]" => "%{severity}" }
    }
  }

  # Add organization tag
  mutate {
    add_field => { "[organization][name]" => "CarePlus Medical Group" }
  }

  # Remove unnecessary fields to save storage
  mutate {
    remove_field => ["@version", "host"]
  }
}

output {
  # Primary output: Elasticsearch
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "careplus-security-logs"
    action => "index"
    # Enable if using ILM (Index Lifecycle Management)
    # ilm_enabled => true
    # ilm_rollover_alias => "careplus-security"
    # ilm_pattern => "{now/d}-000001"
    # ilm_policy => "careplus-logs-policy"
  }

  # Debug output to stdout (remove in production)
  stdout {
    codec => rubydebug
  }
}
