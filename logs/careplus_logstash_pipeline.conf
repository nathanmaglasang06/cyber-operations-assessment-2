input {
  file {
    path => "/path/to/careplus_elk_security_logs.jsonl"
    start_position => "beginning"
    sincedb_path => "/dev/null"
    codec => "json"
  }
}

filter {
  date {
    match => [ "@timestamp", "ISO8601" ]
    target => "@timestamp"
  }
}

output {
  elasticsearch {
    hosts => ["http://localhost:9200"]
    index => "careplus-security-logs"
  }
  stdout { codec => rubydebug }
}

